<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTCOM // Workshop Enterprise OS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root {
            --bg-body: #050505; --bg-card: #0c0c0c; --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.2); --border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff; --text-dim: #71717a; --success: #10b981;
            --danger: #ef4444; --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        aside { width: 280px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem; z-index: 50; }
        .brand { display: flex; align-items: center; gap: 12px; padding: 1rem; margin-bottom: 2rem; }
        .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), #1d4ed8); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 1rem; border-radius: 12px; color: var(--text-dim); border: none; background: none; width: 100%; cursor: pointer; font-weight: 600; }
        .nav-link.active { color: #fff; background: var(--accent); }
        
        main { flex: 1; overflow-y: auto; padding: 2.5rem; position: relative; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 2.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 24px; }
        .glass-panel { background: var(--bg-card); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; margin-bottom: 2rem; }
        input, select, textarea { background: #121212; border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: #fff; width: 100%; }
        .btn-action { background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; justify-content: center; }
        
        .table-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.02); padding: 1rem; text-align: left; font-size: 10px; color: var(--text-dim); }
        td { padding: 1rem; border-top: 1px solid var(--border); font-size: 13px; }
        .status-badge { padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
    </style>
</head>
<body>

    <aside>
        <div class="brand">
            <div class="brand-icon"><i data-lucide="shield-check" color="white"></i></div>
            <div class="brand-text"><h2 style="font-weight:800;font-style:italic;">NEXTCOM</h2><span style="font-size:9px;color:var(--accent);letter-spacing:2px;">SYSTEMS OS</span></div>
        </div>
        <nav>
            <p style="font-size:10px; color:var(--text-dim); margin-bottom:10px; padding-left:10px;">MENÚ</p>
            <button class="nav-link active" onclick="showView('dash')"><i data-lucide="layout-dashboard"></i> Dashboard</button>
            <button class="nav-link" onclick="showView('taller')"><i data-lucide="wrench"></i> Laboratorio</button>
            <button class="nav-link" onclick="showView('inventario')"><i data-lucide="box"></i> Inventario</button>
            <button class="nav-link" onclick="showView('finanzas')"><i data-lucide="banknote"></i> Finanzas</button>
        </nav>
    </aside>

    <main>
        <section id="view-dash" class="view active">
            <h1 style="font-size:2.5rem; font-weight:800; margin-bottom:2rem;">ESTADO <span style="color:var(--accent)">OPERATIVO</span></h1>
            <div class="stats-container">
                <div class="stat-card"><p style="font-size:10px; color:var(--text-dim);">INGRESOS</p><h3 id="dash-ingresos" style="font-size:1.8rem;">$0.00</h3></div>
                <div class="stat-card"><p style="font-size:10px; color:var(--text-dim);">ÓRDENES</p><h3 id="dash-reparas" style="font-size:1.8rem;">0</h3></div>
                <div class="stat-card"><p style="font-size:10px; color:var(--text-dim);">STOCK</p><h3 id="dash-stock" style="font-size:1.8rem;">0</h3></div>
                <div class="stat-card"><p style="font-size:10px; color:var(--text-dim);">CAJA</p><h3 id="dash-caja" style="font-size:1.8rem;">$0.00</h3></div>
            </div>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
                <div class="table-container">
                    <table id="table-recent">
                        <thead><tr><th>ID</th><th>Dispositivo</th><th>Cliente</th><th>Estado</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="glass-panel"><canvas id="chart-finanzas"></canvas></div>
            </div>
        </section>

        <section id="view-taller" class="view">
            <h1 style="font-size:2rem; font-weight:800; margin-bottom:2rem;">NUEVA <span>ORDEN</span></h1>
            <div class="glass-panel">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                    <div>
                        <p style="font-size:10px; font-weight:800; color:var(--text-dim); margin-bottom:15px;">CLIENTE</p>
                        <input type="text" id="tk-cliente" placeholder="Nombre completo" style="margin-bottom:15px;">
                        <input type="text" id="tk-tel" placeholder="Teléfono" style="margin-bottom:15px;">
                        <textarea id="tk-falla" rows="4" placeholder="Descripción de la falla"></textarea>
                    </div>
                    <div>
                        <p style="font-size:10px; font-weight:800; color:var(--text-dim); margin-bottom:15px;">EQUIPO</p>
                        <div style="display:flex; gap:10px; margin-bottom:15px;">
                            <input type="text" id="tk-marca" placeholder="Marca">
                            <input type="text" id="tk-equipo" placeholder="Modelo">
                        </div>
                        <input type="text" id="tk-imei" placeholder="IMEI / Serial" style="margin-bottom:15px;">
                        <div style="background:rgba(245,158,11,0.05); padding:15px; border-radius:12px; border:1px solid #332b00;">
                            <p style="font-size:9px; color:#f59e0b; margin-bottom:5px;">SEGURIDAD</p>
                            <input type="text" id="tk-pin" placeholder="PIN / Contraseña">
                        </div>
                        <p style="margin-top:15px; font-size:10px;">PRESUPUESTO</p>
                        <input type="number" id="tk-costo" value="0" style="font-size:1.5rem; color:var(--success); font-weight:800;">
                    </div>
                </div>
                <button class="btn-action" style="width:100%; margin-top:30px;" onclick="guardarOrden()">REGISTRAR TICKET</button>
            </div>
        </section>

        <section id="view-inventario" class="view">
            <h1>INVENTARIO</h1>
            <div class="glass-panel">
                <input type="text" id="inv-item" placeholder="Nombre Item" style="width:300px;">
                <button class="btn-action" onclick="addInventario()">Agregar</button>
            </div>
            <div class="table-container"><table><tbody id="table-inv"></tbody></table></div>
        </section>

        <section id="view-finanzas" class="view">
            <h1>FINANZAS</h1>
            <div class="table-container"><table id="table-movs"><tbody></tbody></table></div>
        </section>
    </main>

    <div id="toast-container"></div>

    <script>
        let DATA = JSON.parse(localStorage.getItem('nextcom_db')) || {
            ordenes: [], inventario: [], finanzas: { ingresos: 0, gastos: 0, movimientos: [] }
        };

        let myChart;

        window.onload = () => {
            initChart();
            updateUI();
            lucide.createIcons();
        };

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function guardarOrden() {
            const orden = {
                id: 'NX' + (DATA.ordenes.length + 101),
                fecha: new Date().toLocaleDateString(),
                cliente: document.getElementById('tk-cliente').value,
                equipo: document.getElementById('tk-equipo').value,
                marca: document.getElementById('tk-marca').value,
                costo: parseFloat(document.getElementById('tk-costo').value) || 0,
                estado: 'PENDIENTE'
            };
            if(!orden.cliente || !orden.equipo) return alert("Faltan datos");
            DATA.ordenes.unshift(orden);
            DATA.finanzas.ingresos += orden.costo;
            save();
            showView('dash');
        }

        function save() {
            localStorage.setItem('nextcom_db', JSON.stringify(DATA));
            updateUI();
        }

        function updateUI() {
            document.getElementById('dash-ingresos').innerText = `$${DATA.finanzas.ingresos.toFixed(2)}`;
            document.getElementById('dash-reparas').innerText = DATA.ordenes.length;
            const tbody = document.getElementById('table-recent').querySelector('tbody');
            tbody.innerHTML = DATA.ordenes.slice(0, 5).map(o => `
                <tr><td>${o.id}</td><td>${o.marca} ${o.equipo}</td><td>${o.cliente}</td><td>${o.estado}</td></tr>
            `).join('');
        }

        function initChart() {
            const ctx = document.getElementById('chart-finanzas');
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: ['L','M','X','J','V','S','D'], datasets: [{ label:'Ventas', data: [0,0,0,0,0,0,0], borderColor:'#2563eb' }] },
                options: { plugins:{legend:{display:false}}, scales:{y:{display:false}} }
            });
        }
    </script>
</body>
</html>
