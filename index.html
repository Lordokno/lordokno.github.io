<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETERNA OS | Full Dynamic Edition</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --surface: #0e0e11;
            --card: rgba(23, 23, 27, 0.7);
            --accent: #3d5afe;
            --accent-glow: rgba(61, 90, 254, 0.3);
            --edit: #ffab00;
            --success: #00e676;
            --warning: #ffd600;
            --danger: #ff1744;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font: 'Space Grotesk', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: var(--text-main); font-family: var(--font); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        aside { width: 280px; background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 24px; z-index: 100; }
        .logo { font-size: 22px; font-weight: 700; margin-bottom: 60px; display: flex; align-items: center; gap: 12px; color: white; }
        .logo i { padding: 8px; background: var(--accent); border-radius: 10px; box-shadow: 0 0 20px var(--accent-glow); }
        .nav-item { padding: 14px 16px; border-radius: 12px; color: var(--text-dim); cursor: pointer; transition: 0.4s; display: flex; align-items: center; gap: 14px; font-weight: 500; margin-bottom: 6px; }
        .nav-item:hover { color: white; background: rgba(255, 255, 255, 0.03); }
        .nav-item.active { background: linear-gradient(135deg, var(--accent), #2a3eb1); color: white; box-shadow: 0 12px 24px -8px var(--accent-glow); }

        /* --- MAIN VIEW --- */
        main { flex: 1; overflow-y: auto; padding: 50px 60px; }
        .view { display: none; }
        .view.active { display: block; animation: viewFade 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes viewFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UI COMPONENTS --- */
        .page-header h1 { font-size: 42px; font-weight: 700; letter-spacing: -1.5px; margin-bottom: 8px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 50px; }
        .stat-card { background: var(--card); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; position: relative; transition: 0.3s; }
        .stat-card:hover { border-color: rgba(255,255,255,0.1); transform: translateY(-3px); }
        .stat-card h4 { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px; }
        .stat-card .value { font-size: 38px; font-weight: 700; font-family: var(--mono); }

        .glass-panel { background: var(--card); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; margin-bottom: 30px; transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .glass-panel.editing { border-color: var(--edit); box-shadow: 0 0 30px rgba(255, 171, 0, 0.15); background: rgba(255, 171, 0, 0.02); }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .input-group label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        input, textarea { background: rgba(0, 0, 0, 0.4); border: 1px solid var(--glass-border); padding: 14px 18px; border-radius: 12px; color: white; font-family: var(--font); transition: 0.3s; width: 100%; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.03); }

        .btn-action { background: white; color: black; padding: 16px 28px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-action.update-mode { background: var(--edit); color: black; }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        /* --- TABLE STYLE --- */
        .table-container { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .table-container th { text-align: left; padding: 10px 20px; color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        .table-container td { background: rgba(255, 255, 255, 0.02); padding: 18px 20px; font-size: 14px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .table-container td:first-child { border-radius: 14px 0 0 14px; border-left: 1px solid var(--border); }
        .table-container td:last-child { border-radius: 0 14px 14px 0; border-right: 1px solid var(--border); }
        
        .badge { padding: 6px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; font-family: var(--mono); text-transform: uppercase; }
        .badge-pending { background: rgba(255, 214, 0, 0.1); color: var(--warning); }
        .badge-done { background: rgba(0, 230, 118, 0.1); color: var(--success); }

        .icon-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; transition: 0.2s; padding: 5px; }
        .icon-btn:hover { color: white; transform: scale(1.2); }
        .edit-trigger:hover { color: var(--edit) !important; }

        .inv-controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 5px; }

    </style>
</head>
<body>

    <aside>
        <div class="logo"><i data-lucide="layers"></i> AETERNA</div>
        <nav>
            <div class="nav-item active" onclick="go('dash', this)"><i data-lucide="layout-dashboard"></i> Dashboard</div>
            <div class="nav-item" onclick="go('lab', this)"><i data-lucide="wrench"></i> Laboratorio</div>
            <div class="nav-item" onclick="go('inv', this)"><i data-lucide="box"></i> Inventario</div>
        </nav>
    </aside>

    <main>
        <section id="v-dash" class="view active">
            <div class="page-header">
                <h1>Insights <span style="color:var(--accent)">Global</span></h1>
                <p id="date-now" style="font-size: 14px; color:var(--text-dim)"></p>
            </div>
            <div class="stats-row">
                <div class="stat-card"><h4>Servicios</h4><div class="value" id="st-total">0</div></div>
                <div class="stat-card"><h4>Pendientes</h4><div class="value" id="st-process" style="color:var(--warning)">0</div></div>
                <div class="stat-card"><h4>Revenue</h4><div class="value" id="st-cash" style="color:var(--success)">$0</div></div>
            </div>
            <table class="table-container">
                <thead><tr><th>ID</th><th>Cliente</th><th>Modelo</th><th>Estado</th></tr></thead>
                <tbody id="dash-table"></tbody>
            </table>
        </section>

        <section id="v-lab" class="view">
            <div class="page-header"><h1>Gestión de <span style="color:var(--accent)">Servicios</span></h1></div>
            <div class="glass-panel" id="lab-panel">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="input-group"><label>Cliente</label><input type="text" id="l-name"></div>
                    <div class="input-group"><label>WhatsApp</label><input type="text" id="l-phone"></div>
                </div>
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px;">
                    <div class="input-group"><label>Modelo</label><input type="text" id="l-model"></div>
                    <div class="input-group"><label>PIN</label><input type="text" id="l-pin"></div>
                    <div class="input-group"><label>Precio ($)</label><input type="number" id="l-price"></div>
                </div>
                <div class="input-group"><label>Falla Reportada</label><textarea id="l-fail" rows="2"></textarea></div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-action" id="btn-lab-save" onclick="Engine.processOrder()">
                        <i data-lucide="plus-circle"></i> <span id="txt-lab-btn">REGISTRAR ORDEN</span>
                    </button>
                    <button class="btn-action" id="btn-lab-cancel" style="display:none; background:rgba(255,255,255,0.05); color:white;" onclick="Engine.cancelEdit('lab')">CANCELAR</button>
                </div>
            </div>
            <table class="table-container">
                <thead><tr><th>Ticket</th><th>Cliente</th><th>Modelo</th><th>Costo</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody id="lab-table"></tbody>
            </table>
        </section>

        <section id="v-inv" class="view">
            <div class="page-header"><h1>Stock <span style="color:var(--accent)">Master</span></h1></div>
            <div class="glass-panel" id="inv-panel" style="display: flex; gap: 15px; align-items: flex-end;">
                <div class="input-group" style="flex:2; margin-bottom:0;"><label>Repuesto</label><input type="text" id="i-item"></div>
                <div class="input-group" style="flex:1; margin-bottom:0;"><label>Cant</label><input type="number" id="i-qty"></div>
                <div class="input-group" style="flex:1; margin-bottom:0;"><label>Costo</label><input type="number" id="i-cost"></div>
                <button class="btn-action" id="btn-inv-save" onclick="Engine.processInv()">
                    <i data-lucide="plus"></i> <span id="txt-inv-btn">AÑADIR</span>
                </button>
                <button class="btn-action" id="btn-inv-cancel" style="display:none; background:rgba(255,255,255,0.05); color:white;" onclick="Engine.cancelEdit('inv')">X</button>
            </div>
            <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top:30px;" id="inv-grid"></div>
        </section>
    </main>

    <script>
        const Engine = {
            db: JSON.parse(localStorage.getItem('AETERNA_DB')) || { orders: [], stock: [] },
            editState: { lab: null, inv: null },

            init() {
                this.refresh();
                setInterval(() => { document.getElementById('date-now').innerText = new Date().toLocaleString(); }, 1000);
            },

            save() {
                localStorage.setItem('AETERNA_DB', JSON.stringify(this.db));
                this.refresh();
            },

            refresh() {
                this.renderDash();
                this.renderLab();
                this.renderInv();
                lucide.createIcons();
            },

            // --- LÓGICA LABORATORIO ---
            processOrder() {
                const data = {
                    client: document.getElementById('l-name').value,
                    phone: document.getElementById('l-phone').value,
                    model: document.getElementById('l-model').value,
                    pin: document.getElementById('l-pin').value,
                    price: parseFloat(document.getElementById('l-price').value) || 0,
                    fail: document.getElementById('l-fail').value
                };

                if(!data.client || !data.model) return alert("Faltan datos");

                if(this.editState.lab) {
                    const idx = this.db.orders.findIndex(o => o.id === this.editState.lab);
                    this.db.orders[idx] = { ...this.db.orders[idx], ...data };
                } else {
                    this.db.orders.unshift({ id: 'TK-' + Math.floor(1000 + Math.random()*9000), ...data, status: 'PENDIENTE' });
                }
                this.save();
                this.cancelEdit('lab');
            },

            editOrder(id) {
                const o = this.db.orders.find(ord => ord.id === id);
                this.editState.lab = id;
                document.getElementById('l-name').value = o.client;
                document.getElementById('l-phone').value = o.phone;
                document.getElementById('l-model').value = o.model;
                document.getElementById('l-pin').value = o.pin;
                document.getElementById('l-price').value = o.price;
                document.getElementById('l-fail').value = o.fail;
                
                document.getElementById('lab-panel').classList.add('editing');
                document.getElementById('txt-lab-btn').innerText = "ACTUALIZAR TICKET";
                document.getElementById('btn-lab-save').classList.add('update-mode');
                document.getElementById('btn-lab-cancel').style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            // --- LÓGICA INVENTARIO ---
            processInv() {
                const data = {
                    name: document.getElementById('i-item').value,
                    qty: parseInt(document.getElementById('i-qty').value) || 0,
                    cost: parseFloat(document.getElementById('i-cost').value) || 0
                };

                if(!data.name) return;

                if(this.editState.inv) {
                    const idx = this.db.stock.findIndex(s => s.id === this.editState.inv);
                    this.db.stock[idx] = { ...this.db.stock[idx], ...data };
                } else {
                    this.db.stock.unshift({ id: Date.now(), ...data });
                }
                this.save();
                this.cancelEdit('inv');
            },

            editInv(id) {
                const s = this.db.stock.find(item => item.id === id);
                this.editState.inv = id;
                document.getElementById('i-item').value = s.name;
                document.getElementById('i-qty').value = s.qty;
                document.getElementById('i-cost').value = s.cost;

                document.getElementById('inv-panel').classList.add('editing');
                document.getElementById('txt-inv-btn').innerText = "ACTUALIZAR";
                document.getElementById('btn-inv-save').classList.add('update-mode');
                document.getElementById('btn-inv-cancel').style.display = 'block';
            },

            // --- UTILIDADES ---
            cancelEdit(type) {
                this.editState[type] = null;
                if(type === 'lab') {
                    ['l-name', 'l-phone', 'l-model', 'l-pin', 'l-price', 'l-fail'].forEach(i => document.getElementById(i).value = '');
                    document.getElementById('lab-panel').classList.remove('editing');
                    document.getElementById('txt-lab-btn').innerText = "REGISTRAR ORDEN";
                    document.getElementById('btn-lab-save').classList.remove('update-mode');
                    document.getElementById('btn-lab-cancel').style.display = 'none';
                } else {
                    ['i-item', 'i-qty', 'i-cost'].forEach(i => document.getElementById(i).value = '');
                    document.getElementById('inv-panel').classList.remove('editing');
                    document.getElementById('txt-inv-btn').innerText = "AÑADIR";
                    document.getElementById('btn-inv-save').classList.remove('update-mode');
                    document.getElementById('btn-inv-cancel').style.display = 'none';
                }
            },

            deleteItem(type, id) {
                if(confirm("¿Eliminar registro?")) {
                    if(type === 'lab') this.db.orders = this.db.orders.filter(o => o.id !== id);
                    else this.db.stock = this.db.stock.filter(s => s.id !== id);
                    this.save();
                }
            },

            toggleStatus(id) {
                const o = this.db.orders.find(ord => ord.id === id);
                o.status = o.status === 'PENDIENTE' ? 'LISTO' : 'PENDIENTE';
                this.save();
            },

            // --- RENDERS ---
            renderDash() {
                const o = this.db.orders;
                document.getElementById('st-total').innerText = o.length;
                document.getElementById('st-process').innerText = o.filter(x => x.status === 'PENDIENTE').length;
                document.getElementById('st-cash').innerText = '$' + o.reduce((a, b) => a + b.price, 0).toLocaleString();
                document.getElementById('dash-table').innerHTML = o.slice(0, 5).map(x => `<tr><td style="color:var(--accent); font-weight:700;">${x.id}</td><td>${x.client}</td><td>${x.model}</td><td><span class="badge badge-${x.status.toLowerCase()}">${x.status}</span></td></tr>`).join('');
            },

            renderLab() {
                document.getElementById('lab-table').innerHTML = this.db.orders.map(x => `
                    <tr>
                        <td style="font-family:var(--mono); font-weight:700;">${x.id}</td>
                        <td><b>${x.client}</b></td>
                        <td>${x.model}</td>
                        <td style="color:var(--success); font-weight:700;">$${x.price}</td>
                        <td><span onclick="Engine.toggleStatus('${x.id}')" style="cursor:pointer" class="badge badge-${x.status.toLowerCase()}">${x.status}</span></td>
                        <td>
                            <button onclick="Engine.editOrder('${x.id}')" class="icon-btn edit-trigger"><i data-lucide="edit-3" size="18"></i></button>
                            <button onclick="Engine.deleteItem('lab', '${x.id}')" class="icon-btn"><i data-lucide="trash-2" size="18"></i></button>
                        </td>
                    </tr>
                `).join('');
            },

            renderInv() {
                document.getElementById('inv-grid').innerHTML = this.db.stock.map(x => `
                    <div class="stat-card">
                        <div class="inv-controls">
                            <button onclick="Engine.editInv(${x.id})" class="icon-btn edit-trigger"><i data-lucide="edit-3" size="14"></i></button>
                            <button onclick="Engine.deleteItem('inv', ${x.id})" class="icon-btn"><i data-lucide="x" size="14"></i></button>
                        </div>
                        <h4>${x.name}</h4>
                        <div style="display:flex; justify-content:space-between; align-items:baseline;">
                            <span class="value">${x.qty}</span>
                            <span style="color:var(--success); font-weight:700;">$${x.cost}</span>
                        </div>
                    </div>
                `).join('');
            }
        };

        function go(v, el) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            el.classList.add('active');
            lucide.createIcons();
        }

        window.onload = () => Engine.init();
    </script>
</body>
</html>
