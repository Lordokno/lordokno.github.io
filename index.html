<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTCOM // Workshop Enterprise OS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --bg-body: #050505;
            --bg-card: #0c0c0c;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.2);
            --border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-dim: #71717a;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- NAVEGACIÓN --- */
        aside {
            width: 280px;
            background: #000;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            z-index: 50;
        }

        .brand { display: flex; align-items: center; gap: 12px; padding: 1rem; margin-bottom: 2rem; }
        .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), #1d4ed8); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--accent-glow); }
        .brand-text h2 { font-size: 1.2rem; font-weight: 800; font-style: italic; letter-spacing: -0.5px; }
        .brand-text span { font-size: 9px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 1rem; border-radius: 12px;
            color: var(--text-dim); text-decoration: none; font-size: 13px; font-weight: 600;
            transition: 0.2s; cursor: pointer; border: none; background: none; width: 100%; text-align: left;
        }
        .nav-link.active { color: #fff; background: var(--accent); }
        .nav-section-title { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 1.5rem 0 0.5rem 1rem; }

        /* --- MAIN --- */
        main { flex: 1; overflow-y: auto; padding: 2.5rem; position: relative; }
        .view { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-content { margin-bottom: 2.5rem; }
        .header-content h1 { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; }
        .header-content h1 span { color: var(--accent); }

        /* --- GRID & CARDS --- */
        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 2.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 24px; position: relative; }
        .stat-card h3 { font-size: 1.8rem; font-weight: 800; margin-top: 0.5rem; }
        .stat-card p { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }

        .glass-panel { background: var(--bg-card); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; margin-bottom: 2rem; }
        
        input, select, textarea {
            background: #121212; border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; color: #fff;
            font-family: inherit; transition: 0.2s; width: 100%;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-action {
            background: var(--accent); color: #fff; border: none;
            padding: 14px 28px; border-radius: 12px; font-weight: 800;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
            display: flex; align-items: center; gap: 10px; justify-content: center;
        }

        /* --- TABLAS --- */
        .table-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.02); padding: 1rem; text-align: left; font-size: 10px; color: var(--text-dim); }
        td { padding: 1rem; border-top: 1px solid var(--border); font-size: 13px; }

        .status-badge { padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; border: none; }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .status-done { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast { background: #fff; color: #000; padding: 1rem; border-radius: 10px; margin-top: 10px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <aside>
        <div class="brand">
            <div class="brand-icon"><i data-lucide="shield-check" color="white"></i></div>
            <div class="brand-text"><h2>NEXTCOM</h2><span>Systems OS</span></div>
        </div>
        <nav class="nav-menu">
            <p class="nav-section-title">Principal</p>
            <button class="nav-link active" onclick="showView('dash')"><i data-lucide="layout-dashboard"></i> Dashboard</button>
            <button class="nav-link" onclick="showView('taller')"><i data-lucide="wrench"></i> Laboratorio</button>
            <p class="nav-section-title">Gestión</p>
            <button class="nav-link" onclick="showView('inventario')"><i data-lucide="box"></i> Inventario</button>
            <button class="nav-link" onclick="showView('finanzas')"><i data-lucide="banknote"></i> Finanzas</button>
        </nav>
    </aside>

    <main>
        <section id="view-dash" class="view active">
            <div class="header-content"><h1>ESTADO <span>OPERATIVO</span></h1></div>
            <div class="stats-container">
                <div class="stat-card"><p>Ingresos</p><h3 id="dash-ingresos">$0.00</h3></div>
                <div class="stat-card"><p>Órdenes</p><h3 id="dash-reparas">0</h3></div>
                <div class="stat-card"><p>Stock</p><h3 id="dash-stock">0</h3></div>
                <div class="stat-card"><p>Caja</p><h3 id="dash-caja">$0.00</h3></div>
            </div>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
                <div class="table-container">
                    <div style="padding: 1rem; font-weight: 800; font-size: 12px;">ÚLTIMOS INGRESOS</div>
                    <table id="table-recent">
                        <thead><tr><th>ID</th><th>Dispositivo</th><th>Cliente</th><th>Estado</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="glass-panel"><canvas id="chart-finanzas"></canvas></div>
            </div>
        </section>

        <section id="view-taller" class="view">
            <div class="header-content"><h1>NUEVA <span>ORDEN</span></h1></div>
            <div class="glass-panel">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                    <div>
                        <p class="nav-section-title" style="margin:0 0 15px 0;">INFORMACIÓN DEL CLIENTE</p>
                        <input type="text" id="tk-cliente" placeholder="Nombre del cliente" style="margin-bottom:15px;">
                        <div style="display: flex; gap: 10px; margin-bottom:20px;">
                            <input type="text" id="tk-tel" placeholder="Teléfono / WhatsApp">
                            <input type="text" id="tk-email" placeholder="Email (Opcional)">
                        </div>
                        <p class="nav-section-title" style="margin-bottom:10px;">TÉCNICO ASIGNADO</p>
                        <select id="tk-tecnico" style="margin-bottom:20px;">
                            <option>Sin asignar</option>
                            <option>Técnico Principal</option>
                            <option>Técnico de Apoyo</option>
                        </select>
                        <p class="nav-section-title" style="margin-bottom:10px;">FALLA REPORTADA</p>
                        <textarea id="tk-falla" rows="4" placeholder="Describa el problema..."></textarea>
                    </div>
                    <div>
                        <p class="nav-section-title" style="margin:0 0 15px 0;">DATOS DEL EQUIPO</p>
                        <div style="display: flex; gap: 10px; margin-bottom:15px;">
                            <select id="tk-tipo"><option>Smartphone</option><option>Laptop</option></select>
                            <input type="text" id="tk-marca" placeholder="Marca (Ej: Apple)">
                        </div>
                        <input type="text" id="tk-equipo" placeholder="Modelo" style="margin-bottom:15px;">
                        <div style="display: flex; gap: 10px; margin-bottom:20px;">
                            <input type="text" id="tk-imei" placeholder="IMEI / Serial">
                            <input type="text" id="tk-color" placeholder="Color">
                        </div>
                        <div style="background: rgba(245,158,11,0.05); padding: 15px; border-radius: 12px; border: 1px solid #332b00;">
                            <p style="font-size:10px; font-weight:800; color:#f59e0b; margin-bottom:8px;">SEGURIDAD</p>
                            <input type="text" id="tk-pin" placeholder="PIN o Contraseña" style="border-color:#444;">
                        </div>
                        <p class="nav-section-title" style="margin: 20px 0 10px 0;">PRESUPUESTO</p>
                        <input type="number" id="tk-costo" value="0" style="font-size:1.5rem; color:var(--success); font-weight:800;">
                    </div>
                </div>
                <button class="btn-action" style="width:100%; margin-top:30px; height:55px;" onclick="guardarOrden()">
                    <i data-lucide="plus-circle"></i> REGISTRAR TICKET
                </button>
            </div>
        </section>

        <section id="view-inventario" class="view">
            <div class="header-content"><h1>STOCK</h1></div>
            <div class="glass-panel">
                <input type="text" id="inv-item" placeholder="Nombre Item" style="width:200px;">
                <button class="btn-action" onclick="addInventario()">Agregar</button>
            </div>
            <div class="table-container"><table><tbody id="table-inv"></tbody></table></div>
        </section>

        <section id="view-finanzas" class="view">
            <div class="header-content"><h1>FINANZAS</h1></div>
            <div class="table-container"><table id="table-movs"><tbody></tbody></table></div>
        </section>
    </main>

    <div id="toast-container"></div>

    <script>
        let DATA = JSON.parse(localStorage.getItem('nextcom_v5')) || {
            ordenes: [],
            inventario: [],
            finanzas: { ingresos: 0, gastos: 0, movimientos: [] }
        };

        let myChart;

        window.onload = () => {
            initChart();
            updateUI();
            lucide.createIcons();
        };

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function guardarOrden() {
            const cliente = document.getElementById('tk-cliente').value;
            const equipo = document.getElementById('tk-equipo').value;
            const marca = document.getElementById('tk-marca').value;
            const costo = parseFloat(document.getElementById('tk-costo').value) || 0;

            if(!cliente || !equipo) return notify("Nombre y Modelo son obligatorios", "error");

            const orden = {
                id: 'NX' + (DATA.ordenes.length + 101),
                fecha: new Date().toLocaleDateString(),
                cliente,
                equipo,
                marca,
                costo,
                estado: 'PENDIENTE',
                pin: document.getElementById('tk-pin').value,
                imei: document.getElementById('tk-imei').value
            };

            DATA.ordenes.unshift(orden);
            DATA.finanzas.ingresos += costo;
            DATA.finanzas.movimientos.unshift({ fecha: orden.fecha, concepto: `Orden ${orden.id}`, tipo: 'IN', monto: costo });
            
            save();
            notify("Orden registrada");
            clearFormTaller();
            showView('dash');
        }

        function cambiarEstado(index, nuevoEstado) {
            DATA.ordenes[index].estado = nuevoEstado;
            save();
            notify("Estado actualizado");
        }

        function clearFormTaller() {
            ['tk-cliente', 'tk-tel', 'tk-email', 'tk-falla', 'tk-marca', 'tk-equipo', 'tk-imei', 'tk-color', 'tk-pin'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('tk-costo').value = 0;
        }

        function save() {
            localStorage.setItem('nextcom_v5', JSON.stringify(DATA));
            updateUI();
        }

        function updateUI() {
            document.getElementById('dash-ingresos').innerText = `$${DATA.finanzas.ingresos.toFixed(2)}`;
            document.getElementById('dash-reparas').innerText = DATA.ordenes.length;
            document.getElementById('dash-caja').innerText = `$${(DATA.finanzas.ingresos - DATA.finanzas.gastos).toFixed(2)}`;

            const tbody = document.getElementById('table-recent').querySelector('tbody');
            tbody.innerHTML = DATA.ordenes.slice(0, 5).map((o, index) => `
                <tr>
                    <td><span style="color:var(--accent); font-weight:800;">${o.id}</span></td>
                    <td>${o.marca} ${o.equipo}</td>
                    <td>${o.cliente}</td>
                    <td>
                        <select onchange="cambiarEstado(${index}, this.value)" class="status-badge ${o.estado === 'PENDIENTE' ? 'status-pending' : 'status-done'}" style="background:transparent; cursor:pointer;">
                            <option value="PENDIENTE" ${o.estado === 'PENDIENTE' ? 'selected' : ''} style="background:#000">PENDIENTE</option>
                            <option value="LISTO" ${o.estado === 'LISTO' ? 'selected' : ''} style="background:#000">LISTO</option>
                        </select>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function notify(msg, type = "success") {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i data-lucide="check"></i> ${msg}`;
            document.getElementById('toast-container').appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.remove(), 2500);
        }

        function initChart() {
            const ctx = document.getElementById('chart-finanzas');
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: ['L','M','X','J','V','S','D'], datasets: [{ label:'Ingresos', data: [0,0,0,0,0,0,0], borderColor:'#2563eb', tension:0.4 }] },
                options: { plugins:{legend:{display:false}}, scales:{y:{display:false}} }
            });
        }
    </script>
</body>
</html>
