<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTCOM // Control Panel</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #050505;
            --accent: #2563eb;
            --border: rgba(255, 255, 255, 0.05);
            --text-muted: #666;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; background: var(--bg-main); color: white; font-family: 'Inter', sans-serif; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* Sidebar */
        aside {
            width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 2rem 1.5rem;
        }
        .logo-container { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .logo-icon { background: linear-gradient(to bottom right, #3b82f6, #1d4ed8); padding: 10px; border-radius: 12px; }
        .logo-text h1 { margin: 0; font-size: 1.25rem; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: -1px; }
        .logo-text span { font-size: 8px; font-weight: 900; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; }

        /* Navigation */
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 16px;
            color: #888; text-decoration: none; font-size: 13px; font-weight: 700; margin-bottom: 8px;
            transition: all 0.2s; background: transparent; border: 1px solid transparent; width: 100%; cursor: pointer; text-transform: uppercase;
        }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.05); border-color: var(--border); }
        .nav-item.active { color: var(--accent); border-color: rgba(37, 99, 235, 0.2); }

        /* Main Content */
        main { flex: 1; padding: 2rem 3rem; overflow-y: auto; position: relative; }
        .glow { position: fixed; top: 0; right: 0; width: 50%; height: 50%; background: var(--accent); border-radius: 50%; filter: blur(150px); opacity: 0.05; z-index: -1; }

        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & UI */
        .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; background: rgba(37, 99, 235, 0.1); border: 1px solid rgba(37, 99, 235, 0.2); border-radius: 100px; color: #60a5fa; font-size: 10px; font-weight: 900; text-transform: uppercase; margin-bottom: 16px; }
        h2.title { font-size: 4rem; font-weight: 900; font-style: italic; text-transform: uppercase; margin: 0; letter-spacing: -3px; line-height: 0.9; }
        h2.title span { color: var(--accent); text-decoration: underline; text-decoration-color: rgba(37, 99, 235, 0.3); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .stat-card { background: rgba(255,255,255, 0.02); border: 1px solid var(--border); padding: 30px; border-radius: 40px; }
        .stat-card h3 { font-size: 2.5rem; font-weight: 900; font-style: italic; margin: 8px 0 0 0; }
        .stat-card p { font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--text-muted); margin: 0; letter-spacing: 2px; }

        /* Formulario Estilo Premium */
        .glass-input {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px;
            padding: 15px; color: white; width: 100%; margin-bottom: 15px; font-family: inherit;
        }
        .btn-premium {
            background: var(--accent); color: white; border: none; padding: 15px 30px; 
            border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn-premium:hover { background: #1d4ed8; transform: scale(1.02); }

        /* Table */
        .table-container { background: rgba(255,255,255, 0.02); border: 1px solid var(--border); border-radius: 40px; margin-top: 30px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 20px 40px; text-align: left; font-size: 10px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 20px 40px; font-size: 13px; border-bottom: 1px solid var(--border); }
        
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-proceso { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .status-listo { background: rgba(16, 185, 129, 0.1); color: #10b981; }

        .empty-state { padding: 60px; text-align: center; color: var(--text-muted); font-weight: 900; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="glow"></div>

    <aside>
        <div class="logo-container">
            <div class="logo-icon"><i data-lucide="smartphone" color="white"></i></div>
            <div class="logo-text"><h1>NEXTCOM</h1><span>Workshop OS</span></div>
        </div>
        <nav>
            <button class="nav-item active" onclick="switchTab('dash')"><i data-lucide="layout-dashboard" width="18"></i> Dashboard</button>
            <button class="nav-item" onclick="switchTab('repara')"><i data-lucide="wrench" width="18"></i> Reparaciones</button>
            <button class="nav-item" onclick="switchTab('inventario')"><i data-lucide="package" width="18"></i> Inventario</button>
        </nav>
    </aside>

    <main>
        <div id="tab-dash" class="section active">
            <div class="badge"><i data-lucide="zap" width="12"></i> Resumen Operativo</div>
            <h2 class="title">VISTA <span>GENERAL</span></h2>
            <div class="stats-grid">
                <div class="stat-card"><p>En Laboratorio</p><h3 id="count-proceso">0</h3></div>
                <div class="stat-card"><p>Listos</p><h3 id="count-listos">0</h3></div>
                <div class="stat-card"><p>Ingresos Est.</p><h3 id="total-dinero">$0</h3></div>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>ID</th><th>Equipo</th><th>Cliente</th><th>Estado</th></tr></thead>
                    <tbody id="dash-reparaciones">
                        <tr><td colspan="4" class="empty-state">No hay actividad reciente</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="tab-repara" class="section">
            <h2 class="title">REPARA<span>CIONES</span></h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px;">
                <div class="stat-card">
                    <p style="margin-bottom: 20px;">Nueva Orden de Servicio</p>
                    <input id="rep-equipo" class="glass-input" placeholder="Modelo (Ej: Samsung A54)">
                    <input id="rep-cliente" class="glass-input" placeholder="Nombre del Cliente">
                    <input id="rep-precio" type="number" class="glass-input" placeholder="Precio Presupuestado ($)">
                    <button class="btn-premium" onclick="nuevaReparacion()">Ingresar Equipo</button>
                </div>
                <div class="table-container" style="margin-top: 0;">
                    <table>
                        <thead><tr><th>Equipo</th><th>Acción</th></tr></thead>
                        <tbody id="lista-reparaciones"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-inventario" class="section">
            <h2 class="title">INVEN<span>TARIO</span></h2>
            <div style="margin-top: 30px;" class="stat-card">
                <div style="display: flex; gap: 10px;">
                    <input id="inv-item" class="glass-input" placeholder="Repuesto / Accesorio">
                    <input id="inv-stock" type="number" class="glass-input" placeholder="Cantidad">
                    <button class="btn-premium" onclick="nuevoItem()">+ Stock</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Producto</th><th>Stock</th></tr></thead>
                        <tbody id="lista-inventario"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Datos en Memoria (Se pierden al recargar, se puede conectar a Firebase luego)
        let reparaciones = [];
        let inventario = [];

        function switchTab(tabId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function nuevaReparacion() {
            const equipo = document.getElementById('rep-equipo').value;
            const cliente = document.getElementById('rep-cliente').value;
            const precio = document.getElementById('rep-precio').value;

            if(!equipo || !cliente) return alert("Completa los datos");

            const item = {
                id: Math.floor(Math.random() * 900) + 100,
                equipo, cliente, precio: parseFloat(precio) || 0,
                estado: 'PROCESO'
            };

            reparaciones.push(item);
            actualizarTodo();
            
            // Limpiar inputs
            document.getElementById('rep-equipo').value = '';
            document.getElementById('rep-cliente').value = '';
            document.getElementById('rep-precio').value = '';
        }

        function nuevoItem() {
            const item = document.getElementById('inv-item').value;
            const stock = document.getElementById('inv-stock').value;
            if(!item) return;
            inventario.push({ item, stock });
            renderInventario();
            document.getElementById('inv-item').value = '';
            document.getElementById('inv-stock').value = '';
        }

        function marcarListo(index) {
            reparaciones[index].estado = 'LISTO';
            actualizarTodo();
        }

        function actualizarTodo() {
            renderDash();
            renderReparaciones();
            updateStats();
        }

        function updateStats() {
            const proceso = reparaciones.filter(r => r.estado === 'PROCESO').length;
            const listos = reparaciones.filter(r => r.estado === 'LISTO').length;
            const dinero = reparaciones.reduce((acc, curr) => acc + curr.precio, 0);

            document.getElementById('count-proceso').innerText = proceso;
            document.getElementById('count-listos').innerText = listos;
            document.getElementById('total-dinero').innerText = '$' + dinero.toFixed(2);
        }

        function renderDash() {
            const tbody = document.getElementById('dash-reparaciones');
            if(reparaciones.length === 0) return;
            tbody.innerHTML = reparaciones.map(r => `
                <tr>
                    <td>#${r.id}</td>
                    <td>${r.equipo}</td>
                    <td>${r.cliente}</td>
                    <td><span class="status-pill status-${r.estado.toLowerCase()}">${r.estado}</span></td>
                </tr>
            `).join('');
        }

        function renderReparaciones() {
            const tbody = document.getElementById('lista-reparaciones');
            tbody.innerHTML = reparaciones.map((r, i) => `
                <tr>
                    <td>${r.equipo} <br><small style="color:#444">${r.cliente}</small></td>
                    <td>
                        ${r.estado === 'PROCESO' ? `<button onclick="marcarListo(${i})" style="color:#10b981; background:none; border:none; cursor:pointer; font-weight:bold;">MARCAR LISTO</button>` : 'COMPLETADO'}
                    </td>
                </tr>
            `).join('');
        }

        function renderInventario() {
            const tbody = document.getElementById('lista-inventario');
            tbody.innerHTML = inventario.map(i => `
                <tr>
                    <td>${i.item}</td>
                    <td style="color:${i.stock < 3 ? '#ef4444' : 'white'}">${i.stock} un.</td>
                </tr>
            `).join('');
        }

        lucide.createIcons();
    </script>
</body>
</html>
