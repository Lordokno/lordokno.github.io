<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandra Express // Logística Transnacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563eb; /* Azul Corporativo */
            --primary-dark: #1e40af;
            --success: #16a34a;
            --danger: #dc2626;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            margin: 0; 
            background: var(--bg-body); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Elegante */
        header {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        header h1 { margin: 0; font-size: 1.25rem; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
        .status-badge { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            padding: 2rem;
            flex: 1;
            overflow-y: auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Formulario Flat */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .full-width { grid-column: span 2; }

        label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        /* Botones Flat */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: white; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: #f1f5f9; }

        /* Tabla de Carga */
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 12px; font-size: 0.75rem; color: var(--text-muted); border-bottom: 2px solid var(--border); }
        td { padding: 12px; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
        .row-state { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; color: white; }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<header>
    <h1>SANDRA<span style="font-weight: 300; color: var(--text-muted);">EXPRESS</span></h1>
    <div style="display: flex; gap: 20px; align-items: center;">
        <span id="date-display" style="font-size: 0.85rem; color: var(--text-muted);"></span>
        <span class="status-badge">SISTEMA ACTIVO</span>
    </div>
</header>

<div class="main-container">
    <div class="content-area">
        <div class="card">
            <div class="card-title">📦 Datos del Envío Global</div>
            <div class="form-grid">
                <div class="full-width">
                    <label>CONTENIDO DEL PAQUETE</label>
                    <input id="p-desc" placeholder="Ej: Ropa, calzado, electrónicos...">
                </div>
                <div>
                    <label>PESO (LIBRAS)</label>
                    <input id="p-peso" type="number" placeholder="0.00">
                </div>
                <div>
                    <label>NÚMERO DE PAQUETE</label>
                    <input id="p-num" placeholder="Ejem: 1/3">
                </div>
                <div class="full-width" style="text-align: right; margin-top: 10px;">
                    <button class="btn btn-primary" onclick="addToQueue()">+ AGREGAR A LA LISTA</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📋 Resumen de Carga Actual</div>
            <table>
                <thead>
                    <tr>
                        <th># PACK</th>
                        <th>ESTADO DESTINO</th>
                        <th>PESO (LB)</th>
                        <th>CONTENIDO</th>
                        <th>ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="queue-body">
                    </tbody>
            </table>
            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <button class="btn btn-success" style="flex: 2;" onclick="generateLabels()">📄 GENERAR ETIQUETAS PDF</button>
                <button class="btn btn-outline" style="flex: 1;" onclick="clearQueue()">LIMPIAR LISTA</button>
            </div>
        </div>
    </div>

    <aside class="sidebar-area">
        <div class="card">
            <div class="card-title">📍 Origen (SV)</div>
            <label>NOMBRE REMITENTE</label>
            <input id="rem-nom" placeholder="Nombre completo">
            <label>TELÉFONO SV</label>
            <input id="rem-tel" placeholder="7000-0000">
            <label>DIRECCIÓN RECOLECCIÓN</label>
            <textarea id="rem-dir" rows="2" placeholder="Dirección exacta en El Salvador"></textarea>
        </div>

        <div class="card">
            <div class="card-title">🇺🇸 Destino (USA)</div>
            <label>NOMBRE QUIEN RECIBE</label>
            <input id="des-nom" placeholder="Nombre completo">
            <label>TELÉFONO USA</label>
            <input id="des-tel" placeholder="+1 ...">
            <label>ESTADO</label>
            <select id="des-est">
                <option value="">Seleccione Estado...</option>
                <option value="California">California</option>
                <option value="Texas">Texas</option>
                <option value="Florida">Florida</option>
                <option value="New York">New York</option>
                <option value="Virginia">Virginia</option>
                <option value="Maryland">Maryland</option>
            </select>
            <label>DIRECCIÓN COMPLETA</label>
            <textarea id="des-dir" rows="3" placeholder="Street, Apt, City, Zip Code"></textarea>
        </div>
    </aside>
</div>

<div id="toast">Tarea completada</div>

<script>
    // Configuración de Colores de Estado (Elegantes)
    const stateColors = {
        "California": "#1e40af",
        "Texas": "#b91c1c",
        "Florida": "#0369a1",
        "New York": "#334155",
        "Virginia": "#6d28d9",
        "Maryland": "#c2410c"
    };

    let queue = [];

    function addToQueue() {
        const item = {
            desc: document.getElementById('p-desc').value,
            peso: document.getElementById('p-peso').value,
            num: document.getElementById('p-num').value,
            estado: document.getElementById('des-est').value,
            // Datos persistentes del formulario
            remitente: document.getElementById('rem-nom').value,
            recibe: document.getElementById('des-nom').value,
            direccion: document.getElementById('des-dir').value
        };

        if(!item.desc || !item.estado) {
            notify("Complete el contenido y el estado");
            return;
        }

        queue.push(item);
        renderTable();
        
        // Limpiar solo los campos del paquete
        document.getElementById('p-desc').value = '';
        document.getElementById('p-peso').value = '';
        document.getElementById('p-num').value = '';
        notify("Paquete añadido");
    }

    function renderTable() {
        const body = document.getElementById('queue-body');
        body.innerHTML = '';
        queue.forEach((p, i) => {
            const color = stateColors[p.estado] || '#64748b';
            body.innerHTML += `
                <tr>
                    <td><strong>${p.num}</strong></td>
                    <td><span class="row-state" style="background:${color}">${p.estado}</span></td>
                    <td>${p.peso} Lbs</td>
                    <td>${p.desc}</td>
                    <td><button onclick="removeItem(${i})" style="color:var(--danger); background:none; border:none; cursor:pointer; font-weight:bold;">Eliminar</button></td>
                </tr>
            `;
        });
    }

    function removeItem(idx) {
        queue.splice(idx, 1);
        renderTable();
    }

    function clearQueue() {
        if(confirm("¿Vaciar toda la lista?")) {
            queue = [];
            renderTable();
        }
    }

    function generateLabels() {
        if(queue.length === 0) return notify("No hay paquetes en la lista");

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        queue.forEach((p, i) => {
            if (i > 0 && i % 2 === 0) doc.addPage();
            
            // Posición Y: 0 para el primero de la página, 150 para el segundo
            const y = (i % 2 === 0) ? 10 : 150;
            const accentColor = stateColors[p.estado] || "#000000";

            // Encabezado Etiqueta
            doc.setFillColor(accentColor);
            doc.rect(10, y, 190, 25, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.setFont("helvetica", "bold");
            doc.text(`SANDRA EXPRESS - ${p.estado.toUpperCase()}`, 105, y + 17, { align: 'center' });

            // Cuerpo de la Etiqueta
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);
            
            // Sección Destinatario
            doc.setFont("helvetica", "bold");
            doc.text("DESTINATARIO (USA):", 15, y + 40);
            doc.setFont("helvetica", "normal");
            doc.text(p.recibe.toUpperCase(), 15, y + 48);
            doc.setFontSize(10);
            doc.text(p.direccion, 15, y + 55, { maxWidth: 180 });

            // Línea divisoria
            doc.setDrawColor(200, 200, 200);
            doc.line(15, y + 80, 195, y + 80);

            // Sección Remitente
            doc.setFontSize(11);
            doc.setFont("helvetica", "bold");
            doc.text("REMITENTE (SV):", 15, y + 90);
            doc.setFont("helvetica", "normal");
            doc.text(p.remitente, 15, y + 98);

            // Detalles del paquete
            doc.setFillColor(245, 245, 245);
            doc.rect(15, y + 110, 180, 20, 'F');
            doc.setFont("helvetica", "bold");
            doc.text(`PAQUETE: ${p.num}`, 25, y + 122);
            doc.text(`PESO: ${p.peso} LBS`, 85, y + 122);
            doc.text(`CONTENIDO: ${p.desc.substring(0, 20)}`, 140, y + 122);
        });

        doc.save(`Etiquetas_SandraExpress_${new Date().getTime()}.pdf`);
        notify("PDF Generado con éxito");
    }

    function notify(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // Fecha actual
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('date-display').innerText = new Date().toLocaleDateString('es-ES', options);

</script>

</body>
</html>
