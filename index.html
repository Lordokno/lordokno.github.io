<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTCOM // Workshop & Inventory OS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root {
            --bg-body: #050505; --bg-card: #0c0c0c; --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.2); --border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff; --text-dim: #71717a; --success: #10b981;
            --danger: #ef4444; --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        aside { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; color: var(--text-dim); border: none; background: none; width: 100%; cursor: pointer; font-weight: 600; margin-bottom: 5px; }
        .nav-link.active { color: #fff; background: var(--accent); }
        
        main { flex: 1; overflow-y: auto; padding: 2rem; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-panel { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 20px; margin-bottom: 1.5rem; }
        input, select { background: #121212; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; width: 100%; }
        
        .btn-action { background: var(--accent); color: #fff; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        /* Estilos de Inventario */
        .inv-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; height: calc(100vh - 180px); }
        .scroll-area { overflow-y: auto; padding-right: 10px; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .item-card { background: #0f0f0f; border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .item-card:hover { border-color: var(--accent); }
        .stock-control { display: flex; align-items: center; gap: 15px; background: #1a1a1a; padding: 5px 15px; border-radius: 10px; }
        .btn-qty { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; font-weight: 800; }
        .btn-qty:hover { color: #fff; }

        .badge { font-size: 9px; padding: 3px 8px; border-radius: 5px; font-weight: 800; text-transform: uppercase; }
        .badge-repuesto { background: rgba(37, 99, 235, 0.1); color: var(--accent); }
        .badge-producto { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .toast { background: #fff; color: #000; padding: 12px 20px; border-radius: 10px; font-weight: 700; margin-top: 10px; display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <aside>
        <div style="margin-bottom: 2rem; padding: 10px;">
            <h2 style="font-weight: 800; font-style: italic;">NEXTCOM</h2>
            <p style="font-size: 9px; color: var(--accent); font-weight: 800; letter-spacing: 1px;">INVENTORY SYSTEM</p>
        </div>
        <nav>
            <button class="nav-link" onclick="showView('dash')"><i data-lucide="layout-dashboard"></i> Dashboard</button>
            <button class="nav-link" onclick="showView('taller')"><i data-lucide="wrench"></i> Laboratorio</button>
            <button class="nav-link active" onclick="showView('inventario')"><i data-lucide="box"></i> Inventario</button>
            <button class="nav-link" onclick="showView('finanzas')"><i data-lucide="banknote"></i> Finanzas</button>
        </nav>
    </aside>

    <main>
        <section id="view-inventario" class="view active">
            <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 1.5rem;">CONTROL DE <span style="color:var(--accent)">STOCK</span></h1>
            
            <div class="inv-grid">
                <div class="scroll-area" id="inv-container">
                    </div>

                <div class="glass-panel" style="height: fit-content; position: sticky; top: 0;">
                    <h3 style="margin-bottom: 20px; font-size: 14px; letter-spacing: 1px;">NUEVO ITEM</h3>
                    <input type="hidden" id="inv-edit-id">
                    
                    <label style="font-size: 10px; color: var(--text-dim);">CATEGORÍA</label>
                    <select id="inv-tipo" style="margin: 10px 0 20px 0;">
                        <option value="Repuesto">Repuesto (Pantallas, Pines, etc)</option>
                        <option value="Producto">Producto (Cables, Fundas, etc)</option>
                    </select>

                    <label style="font-size: 10px; color: var(--text-dim);">NOMBRE DEL ARTÍCULO</label>
                    <input type="text" id="inv-nombre" placeholder="Ej: Pantalla iPhone 13 OLED" style="margin: 10px 0 20px 0;">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                        <div>
                            <label style="font-size: 10px; color: var(--text-dim);">STOCK INICIAL</label>
                            <input type="number" id="inv-stock" value="1" style="margin-top: 10px;">
                        </div>
                        <div>
                            <label style="font-size: 10px; color: var(--text-dim);">PRECIO ($)</label>
                            <input type="number" id="inv-precio" value="0" style="margin-top: 10px;">
                        </div>
                    </div>

                    <button class="btn-action" style="width: 100%;" onclick="guardarInventario()">
                        <i data-lucide="save"></i> GUARDAR EN SISTEMA
                    </button>
                </div>
            </div>
        </section>

        <section id="view-dash" class="view"><h1>DASHBOARD</h1></section>
        <section id="view-taller" class="view"><h1>LABORATORIO</h1></section>
        <section id="view-finanzas" class="view"><h1>FINANZAS</h1></section>
    </main>

    <div id="toast-container"></div>

    <script>
        // Inicializar DB
        let DATA = JSON.parse(localStorage.getItem('nextcom_db_v8')) || {
            ordenes: [], 
            finanzas: { ingresos: 0, movimientos: [] }, 
            inventario: [] 
        };

        window.onload = () => { 
            renderInventario(); 
            lucide.createIcons(); 
        };

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'inventario') renderInventario();
        }

        // --- LÓGICA DE INVENTARIO ---

        function guardarInventario() {
            const id = document.getElementById('inv-edit-id').value;
            const nuevoItem = {
                id: id || 'ITM-' + Date.now(),
                tipo: document.getElementById('inv-tipo').value,
                nombre: document.getElementById('inv-nombre').value,
                stock: parseInt(document.getElementById('inv-stock').value) || 0,
                precio: parseFloat(document.getElementById('inv-precio').value) || 0
            };

            if(!nuevoItem.nombre) return notify("Escribe un nombre", "error");

            if(id) {
                const idx = DATA.inventario.findIndex(i => i.id === id);
                DATA.inventario[idx] = nuevoItem;
                notify("Item actualizado");
            } else {
                DATA.inventario.unshift(nuevoItem);
                notify("Item guardado");
            }

            save();
            clearInvForm();
            renderInventario();
        }

        function changeQty(id, delta) {
            const item = DATA.inventario.find(i => i.id === id);
            if(item) {
                item.stock = Math.max(0, item.stock + delta);
                save();
                renderInventario();
            }
        }

        function editItem(id) {
            const item = DATA.inventario.find(i => i.id === id);
            document.getElementById('inv-edit-id').value = item.id;
            document.getElementById('inv-tipo').value = item.tipo;
            document.getElementById('inv-nombre').value = item.nombre;
            document.getElementById('inv-stock').value = item.stock;
            document.getElementById('inv-precio').value = item.precio;
            document.querySelector('.btn-action').innerHTML = '<i data-lucide="refresh-cw"></i> ACTUALIZAR ITEM';
            lucide.createIcons();
        }

        function deleteItem(id) {
            if(confirm("¿Eliminar este producto?")) {
                DATA.inventario = DATA.inventario.filter(i => i.id !== id);
                save();
                renderInventario();
                notify("Eliminado", "warning");
            }
        }

        function renderInventario() {
            const container = document.getElementById('inv-container');
            container.innerHTML = DATA.inventario.map(item => `
                <div class="item-card">
                    <div>
                        <span class="badge ${item.tipo === 'Repuesto' ? 'badge-repuesto' : 'badge-producto'}">${item.tipo}</span>
                        <h4 style="margin-top: 5px;">${item.nombre}</h4>
                        <p style="font-size: 11px; color: var(--success); font-weight: 800; margin-top: 3px;">$${item.precio.toFixed(2)}</p>
                    </div>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div class="stock-control">
                            <button class="btn-qty" onclick="changeQty('${item.id}', -1)">-</button>
                            <span style="min-width: 30px; text-align: center; font-weight: 800; font-size: 14px;">${item.stock}</span>
                            <button class="btn-qty" onclick="changeQty('${item.id}', 1)">+</button>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button onclick="editItem('${item.id}')" style="background:none; border:none; color:var(--text-dim); cursor:pointer;"><i data-lucide="edit-2" style="width:16px;"></i></button>
                            <button onclick="deleteItem('${item.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer;"><i data-lucide="trash" style="width:16px;"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function clearInvForm() {
            document.getElementById('inv-edit-id').value = '';
            document.getElementById('inv-nombre').value = '';
            document.getElementById('inv-stock').value = '1';
            document.getElementById('inv-precio').value = '0';
            document.querySelector('.btn-action').innerHTML = '<i data-lucide="save"></i> GUARDAR EN SISTEMA';
            lucide.createIcons();
        }

        function save() { localStorage.setItem('nextcom_db_v8', JSON.stringify(DATA)); }
        
        function notify(m, t="success") {
            const toast = document.createElement('div'); toast.className = 'toast';
            toast.innerHTML = `<i data-lucide="check-circle"></i> ${m}`;
            document.getElementById('toast-container').appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.remove(), 2500);
        }
    </script>
</body>
</html>
