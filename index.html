<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETERNA OS | v4.0 Unified Interface</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030303;
            --surface: #0a0a0c;
            --card: #111114;
            --accent: #3d5afe;
            --accent-glow: rgba(61, 90, 254, 0.4);
            --success: #00e676;
            --warning: #ffea00;
            --danger: #ff1744;
            --text: #ffffff;
            --text-dim: #71717a;
            --border: rgba(255, 255, 255, 0.08);
            --font: 'Space Grotesk', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font); 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* --- SIDEBAR REFINADO --- */
        aside {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent);
        }

        .nav-item {
            padding: 14px 18px;
            border-radius: var(--radius);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .nav-item:hover { background: rgba(255,255,255,0.03); color: white; }
        .nav-item.active { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .view { display: none; animation: slideUp 0.5s ease-out forwards; }
        .view.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TARJETAS Y GRID --- */
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 25px;
            position: relative;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--accent); }

        .card h3 { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .card .val { font-size: 36px; font-weight: 700; margin: 10px 0; }

        /* --- FORMULARIOS --- */
        .form-panel {
            background: var(--surface);
            padding: 30px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-field { display: flex; flex-direction: column; gap: 8px; }
        .input-field label { font-size: 11px; font-weight: 700; color: var(--text-dim); }
        
        input, select, textarea {
            background: #000;
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-family: var(--font);
            font-size: 14px;
        }

        input:focus { border-color: var(--accent); outline: none; }

        .btn {
            background: var(--accent);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }
        .btn-sm { padding: 8px 12px; font-size: 12px; }

        /* --- TABLAS --- */
        .table-wrap {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: var(--text-dim); font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 20px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: rgba(255,255,255,0.01); }

        .badge {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .badge-pending { background: rgba(255, 234, 0, 0.1); color: var(--warning); }
        .badge-done { background: rgba(0, 230, 118, 0.1); color: var(--success); }

        /* --- NOTIFICACIONES --- */
        #notif-host { position: fixed; top: 30px; right: 30px; z-index: 1000; }
        .toast {
            background: white; color: black; padding: 15px 25px; border-radius: 12px;
            margin-bottom: 10px; font-weight: 700; animation: slideIn 0.3s ease-out;
            display: flex; align-items: center; gap: 10px;
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* --- PRINT --- */
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; top: 0; left: 0; width: 100%; color: #000; background: white; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo"><i data-lucide="shield-check"></i> AETERNA OS</div>
        <nav>
            <div class="nav-item active" onclick="go('dash', this)"><i data-lucide="layout-dashboard"></i> Dashboard</div>
            <div class="nav-item" onclick="go('lab', this)"><i data-lucide="wrench"></i> Laboratorio</div>
            <div class="nav-item" onclick="go('inv', this)"><i data-lucide="box"></i> Inventario</div>
        </nav>

        <div style="margin-top:auto; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 12px;">
            <p style="font-size: 10px; color: var(--text-dim);">BASE DE DATOS</p>
            <p id="db-status" style="font-size: 12px; color: var(--success); font-weight: 700;">SYNCED 100%</p>
        </div>
    </aside>

    <main>
        
        <section id="v-dash" class="view active">
            <div class="header-flex">
                <div>
                    <h1>Resumen General</h1>
                    <p id="date-now" style="color:var(--text-dim)"></p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="card"><h3>Órdenes Totales</h3><div class="val" id="st-total">0</div></div>
                <div class="card"><h3>En Proceso</h3><div class="val" id="st-process" style="color:var(--warning)">0</div></div>
                <div class="card"><h3>Ingresos Estimados</h3><div class="val" id="st-cash" style="color:var(--success)">$0</div></div>
            </div>

            <div class="table-wrap">
                <div style="padding: 20px; font-weight: 700; border-bottom: 1px solid var(--border);">REPARACIONES RECIENTES</div>
                <table>
                    <thead><tr><th>ID</th><th>Cliente</th><th>Modelo</th><th>Estado</th></tr></thead>
                    <tbody id="dash-table"></tbody>
                </table>
            </div>
        </section>

        <section id="v-lab" class="view">
            <div class="header-flex">
                <h1>Ingreso de Laboratorio</h1>
            </div>

            <div class="form-panel">
                <div class="input-row">
                    <div class="input-field"><label>Nombre del Cliente</label><input type="text" id="l-name"></div>
                    <div class="input-field"><label>WhatsApp</label><input type="text" id="l-phone"></div>
                </div>
                <div class="input-row" style="grid-template-columns: 2fr 1fr 1fr;">
                    <div class="input-field"><label>Marca y Modelo</label><input type="text" id="l-model"></div>
                    <div class="input-field"><label>Password / PIN</label><input type="text" id="l-pin"></div>
                    <div class="input-field"><label>Presupuesto ($)</label><input type="number" id="l-price"></div>
                </div>
                <div class="input-field" style="margin-bottom:20px;"><label>Descripción de Falla</label><textarea id="l-fail" rows="3"></textarea></div>
                <button class="btn" onclick="Engine.saveOrder()"><i data-lucide="save"></i> REGISTRAR E IMPRIMIR</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead><tr><th>Ticket</th><th>Cliente</th><th>Modelo</th><th>Precio</th><th>Estado</th><th>Acción</th></tr></thead>
                    <tbody id="lab-table"></tbody>
                </table>
            </div>
        </section>

        <section id="v-inv" class="view">
            <div class="header-flex">
                <h1>Control de Repuestos</h1>
            </div>

            <div class="form-panel" style="display: flex; gap: 20px; align-items: flex-end;">
                <div class="input-field" style="flex:2;"><label>Artículo / Repuesto</label><input type="text" id="i-item"></div>
                <div class="input-field" style="flex:1;"><label>Cantidad</label><input type="number" id="i-qty"></div>
                <div class="input-field" style="flex:1;"><label>Precio Compra</label><input type="number" id="i-cost"></div>
                <button class="btn" onclick="Engine.saveInv()"><i data-lucide="plus"></i> AÑADIR</button>
            </div>

            <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;" id="inv-grid"></div>
        </section>

    </main>

    <div id="notif-host"></div>
    <div id="print-area"></div>

    <script>
        // --- CORE ENGINE ---
        const Engine = {
            db: JSON.parse(localStorage.getItem('AETERNA_DB')) || { orders: [], stock: [] },

            init() {
                this.refresh();
                setInterval(() => {
                    document.getElementById('date-now').innerText = new Date().toLocaleString();
                }, 1000);
                lucide.createIcons();
            },

            save() {
                localStorage.setItem('AETERNA_DB', JSON.stringify(this.db));
                this.refresh();
            },

            refresh() {
                this.renderDash();
                this.renderLab();
                this.renderInv();
                lucide.createIcons();
            },

            // --- LÓGICA DE ÓRDENES ---
            saveOrder() {
                const order = {
                    id: 'TK-' + Math.floor(1000 + Math.random() * 9000),
                    client: document.getElementById('l-name').value,
                    phone: document.getElementById('l-phone').value,
                    model: document.getElementById('l-model').value,
                    pin: document.getElementById('l-pin').value,
                    price: parseFloat(document.getElementById('l-price').value) || 0,
                    fail: document.getElementById('l-fail').value,
                    status: 'PENDIENTE',
                    date: new Date().toLocaleDateString()
                };

                if(!order.client || !order.model) return this.notify("Faltan datos", "error");

                this.db.orders.unshift(order);
                this.save();
                this.notify("Orden Registrada #" + order.id);
                this.clearFields(['l-name', 'l-phone', 'l-model', 'l-pin', 'l-price', 'l-fail']);
                this.printTicket(order);
            },

            toggleStatus(id) {
                const o = this.db.orders.find(ord => ord.id === id);
                o.status = o.status === 'PENDIENTE' ? 'LISTO' : 'PENDIENTE';
                this.save();
            },

            deleteOrder(id) {
                if(confirm("¿Eliminar orden?")) {
                    this.db.orders = this.db.orders.filter(o => o.id !== id);
                    this.save();
                }
            },

            // --- LÓGICA DE INVENTARIO ---
            saveInv() {
                const item = {
                    id: Date.now(),
                    name: document.getElementById('i-item').value,
                    qty: parseInt(document.getElementById('i-qty').value) || 0,
                    cost: parseFloat(document.getElementById('i-cost').value) || 0
                };
                if(!item.name) return;
                this.db.stock.unshift(item);
                this.save();
                this.clearFields(['i-item', 'i-qty', 'i-cost']);
            },

            // --- RENDERS ---
            renderDash() {
                const o = this.db.orders;
                document.getElementById('st-total').innerText = o.length;
                document.getElementById('st-process').innerText = o.filter(x => x.status === 'PENDIENTE').length;
                document.getElementById('st-cash').innerText = '$' + o.reduce((a, b) => a + b.price, 0).toLocaleString();

                const tbody = document.getElementById('dash-table');
                tbody.innerHTML = o.slice(0, 5).map(x => `
                    <tr>
                        <td style="font-family:var(--mono); font-weight:700; color:var(--accent)">${x.id}</td>
                        <td>${x.client}</td>
                        <td>${x.model}</td>
                        <td><span class="badge badge-${x.status === 'PENDIENTE' ? 'pending' : 'done'}">${x.status}</span></td>
                    </tr>
                `).join('');
            },

            renderLab() {
                const tbody = document.getElementById('lab-table');
                tbody.innerHTML = this.db.orders.map(x => `
                    <tr>
                        <td style="font-family:var(--mono); font-weight:700;">${x.id}</td>
                        <td><b>${x.client}</b><br><small>${x.phone}</small></td>
                        <td>${x.model}</td>
                        <td style="color:var(--success); font-weight:700;">$${x.price}</td>
                        <td><span onclick="Engine.toggleStatus('${x.id}')" style="cursor:pointer" class="badge badge-${x.status === 'PENDIENTE' ? 'pending' : 'done'}">${x.status}</span></td>
                        <td>
                            <button onclick="Engine.deleteOrder('${x.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer"><i data-lucide="trash-2" size="16"></i></button>
                        </td>
                    </tr>
                `).join('');
            },

            renderInv() {
                const grid = document.getElementById('inv-grid');
                grid.innerHTML = this.db.stock.map(x => `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                            <span style="font-weight:700;">${x.name}</span>
                            <i data-lucide="box" size="14" color="var(--accent)"></i>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <p style="font-size:10px; color:var(--text-dim);">STOCK</p>
                                <p style="font-size:20px; font-weight:700;">${x.qty}</p>
                            </div>
                            <div style="text-align:right;">
                                <p style="font-size:10px; color:var(--text-dim);">COSTO</p>
                                <p style="font-weight:700; color:var(--success);">$${x.cost}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            },

            // --- UTILS ---
            notify(msg) {
                const host = document.getElementById('notif-host');
                const t = document.createElement('div');
                t.className = 'toast';
                t.innerHTML = `<i data-lucide="check-circle"></i> ${msg}`;
                host.appendChild(t);
                lucide.createIcons();
                setTimeout(() => t.remove(), 3000);
            },

            clearFields(ids) { ids.forEach(id => document.getElementById(id).value = ''); },

            printTicket(o) {
                const zone = document.getElementById('print-area');
                zone.innerHTML = `
                    <div style="padding:40px; font-family:monospace; text-align:center;">
                        <h2>AETERNA TALLER</h2>
                        <p>Orden: ${o.id}</p>
                        <hr>
                        <p align="left">Cliente: ${o.client}</p>
                        <p align="left">Equipo: ${o.model}</p>
                        <p align="left">Falla: ${o.fail}</p>
                        <p align="left">PIN: ${o.pin}</p>
                        <hr>
                        <h3>Total: $${o.price}</h3>
                    </div>
                `;
                window.print();
            }
        };

        function go(v, el) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('v-' + v).classList.add('active');
            el.classList.add('active');
            lucide.createIcons();
        }

        window.onload = () => Engine.init();
    </script>
</body>
</html>
